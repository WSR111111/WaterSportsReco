version: '3.8'  # Docker Compose 파일 버전

services:
  ############################################################
  # PostgreSQL + pgvector
  ############################################################
  postgres:
    image: pgvector/pgvector:pg16        # PostgreSQL 16 + pgvector 확장 기능 포함 이미지
    container_name: ${POSTGRES_CONTAINER_NAME}   # 컨테이너 이름
    restart: always                      # 컨테이너 비정상 종료 시 항상 재시작

    env_file:
      - ../.env                          # 상위 폴더의 .env 파일 불러오기

    ports:
      - "${POSTGRES_PORT}:5432"          # 호스트 포트:컨테이너 포트 (기본 PostgreSQL 포트 5432)

    volumes:
      # PostgreSQL 데이터 영속화 (컨테이너 재시작 시에도 데이터 유지)
      - ./database:/var/lib/postgresql/data

      # 초기화 SQL 스크립트 자동 실행 (컨테이너 시작 시 init.sql 실행)
      - ./init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./init_auth.sql:/docker-entrypoint-initdb.d/02_init_auth.sql

    healthcheck:
      # PostgreSQL이 정상적으로 실행 중인지 확인
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s    # 10초마다 헬스체크
      timeout: 5s      # 응답이 5초 안에 없으면 실패로 간주
      retries: 5       # 5회 시도 후에도 실패하면 unhealthy 상태로 표시
      
############################################################
# 디렉토리 구조 예시
# ├── docker-compose.yml
# ├── database/                # PostgreSQL 데이터 저장 디렉토리
# └── init.sql                  # 초기화 SQL 스크립트
#
# init.sql 내용 예시:
# -------------------------------------
# -- pgvector 확장 기능 활성화
# CREATE EXTENSION IF NOT EXISTS vector;
#
# -- 예제 테이블 생성
# CREATE TABLE documents (
#   id SERIAL PRIMARY KEY,
#   content TEXT,
#   embedding VECTOR(1536) -- OpenAI 등 1536차원 임베딩
# );
# -------------------------------------
############################################################

