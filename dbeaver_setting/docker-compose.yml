services:
  db:
    image: mysql:8.0
    container_name: mysql-watersports
    restart: always
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - ./database:/var/lib/mysql
    env_file:
      - ./.env
    ports:
      - "3307:3306"
